# based on https://github.com/k3s-io/k3s/blob/master/manifests/traefik.yaml
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik-crd
  namespace: kube-system
spec:
  chart: https://%{KUBERNETES_API}%/static/charts/traefik-crd-10.19.300.tgz
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik
  namespace: kube-system
spec:
  chart: https://%{KUBERNETES_API}%/static/charts/traefik-10.19.300.tgz
  set:
    global.systemDefaultRegistry: ""
  valuesContent: |-
    rbac:
      enabled: true
    ports:
      websecure:
        tls:
          enabled: true
    podAnnotations:
      prometheus.io/port: "8082"
      prometheus.io/scrape: "true"
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
    priorityClassName: "system-cluster-critical"
    entryPoints:
      web:
        address: :80
        http:
          routers: 
            http-catchall:
              rule: HostRegexp(`{any:.+}`)
              entrypoints: http
              middlewares: https-redirect
          redirections:
            entryPoint:
              to: websecure
              scheme: https
          middlewares:
            https-redirect:
              redirectScheme:
                scheme: https
                permanent: true
      websecure:
        address: :443          
    image:
      name: "rancher/mirrored-library-traefik"
      tag: "2.6.2"
    tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Exists"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    service:
      ipFamilyPolicy: "PreferDualStack"      
      annotations: 
        metallb.universe.tf/allow-shared-ip: "shared-ip-service-group"
      spec:
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        
